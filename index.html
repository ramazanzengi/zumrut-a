<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zümrüt Plastik Chat</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      background: #fff;
    }
  </style>
</head>
<body>

<script src="https://cdn.botpress.cloud/webchat/v3.6/inject.js"></script>
<script src="https://files.bpcontent.cloud/2026/05/04/19/20260504195310-RUUBA3N3.js" defer></script>

<script>
  function openBot() {
    if (window.botpress) {
      window.botpress.open();
    }
  }

  window.addEventListener("load", function () {
    setTimeout(openBot, 1500);
    setTimeout(openBot, 3000);
    setTimeout(openBot, 5000);
  });
</script>

</body>
</html>
